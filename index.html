<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Saskias Iserlohner Honig</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --green: #6b8e23;
      --light-green: #cfe6a8;
      --honey: #f2c14f;
      --brown: #8b5a2b;
      --cream: #fff9e9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--cream);
      color: #333;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, var(--light-green), var(--honey));
      padding: 2.5rem 1.5rem;
      text-align: center;
      border-bottom: 4px solid var(--green);
    }

    header h1 {
      font-size: 2.4rem;
      color: var(--brown);
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.1rem;
      color: #304020;
    }

    .bee-badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      color: var(--green);
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid rgba(0,0,0,0.05);
    }

    main {
      max-width: 960px;
      margin: 2rem auto 3rem;
      padding: 0 1.5rem;
    }

    section {
      margin-bottom: 2.5rem;
      background: #ffffff;
      border-radius: 12px;
      padding: 1.8rem 1.6rem;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.03);
    }

    section h2 {
      margin-bottom: 1rem;
      color: var(--brown);
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    section h2 span.icon {
      font-size: 1.3rem;
    }

    .intro-text {
      font-size: 1.05rem;
      margin-bottom: 0.8rem;
    }

    .origin {
      border-left: 4px solid var(--green);
      padding-left: 1rem;
      margin-top: 0.8rem;
      font-size: 0.98rem;
      color: #3a4a2a;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .badge {
      font-size: 0.85rem;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      background: var(--light-green);
      color: #304020;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .badge.honey {
      background: var(--honey);
      color: #5a3b00;
    }

    .product-card {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
    }
